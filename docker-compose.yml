version: '3.8'

services:
  db:
    image: postgres:15
    container_name: org_db
    environment:
      POSTGRES_DB: org_db
      POSTGRES_USER: org_user
      POSTGRES_PASSWORD: org_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U org_user -d org_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: org_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://org_user:org_password@db:5432/org_db

volumes:
  postgres_data:

version: '3.8'

services:
  db:
    image: postgres:15
    container_name: org_db
    environment:
      POSTGRES_DB: org_db
      POSTGRES_USER: org_user
      POSTGRES_PASSWORD: org_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: org_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://org_user:org_password@db:5432/org_db

volumes:
  postgres_data: